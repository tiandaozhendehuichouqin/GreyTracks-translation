<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreyTracks</title>
    <link rel="stylesheet" href="../styles/popup.css">
  </head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>GreyTracks</h1>
      <span class="version">v1.0.0</span>
    </header>
    
    <div class="popup-content">
      <!-- 开关控制 -->
      <div class="setting-item">
        <label class="toggle-label">
          <span>启用划词翻译</span>
          <input type="checkbox" id="enabledToggle" class="toggle-checkbox">
          <span class="toggle-slider"></span>
        </label>
      </div>
      
      <!-- 当前语言选择 -->
      <div class="setting-item">
        <label for="targetLang">我的语言</label>
        <select id="targetLang" class="select-input">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
      
      <!-- 需要翻译的语言选择 -->
      <div class="setting-item">
        <label for="sourceLang">需要翻译的语言</label>
        <select id="sourceLang" class="select-input">
          <option value="en">英语</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
      

      
      <!-- 快捷操作 -->
      <div class="quick-actions">
        <button id="saveConfigBtn" class="action-btn">保存配置</button>
        <button id="openOptionsBtn" class="action-btn secondary">设置</button>
      </div>
    </div>
    
    <footer class="popup-footer">
      <p>快捷键：Alt + Z</p>
    </footer>
  </div>
  
  <script type="module" src="../popup/popup.js"></script>
</body>
</html>
